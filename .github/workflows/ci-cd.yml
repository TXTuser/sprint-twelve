name: CI/CD Pipeline

on:
    push:
        branches:
            - main
            - master
        tags:
            - "v*"
    pull_request:
        branches:
            - main
            - master

env:
    DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    DOCKERHUB_REPO: sprint-twelve

jobs:
    test:
        name: Test and Lint
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: "1.22"

            - name: Cache Go modules
              uses: actions/cache@v4
              with:
                  path: ~/go/pkg/mod
                  key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
                  restore-keys: |
                      ${{ runner.os }}-go-

            - name: Download dependencies
              run: go mod tidy

            - name: Check code formatting
              run: |
                  if [ "$(gofmt -l .)" != "" ]; then
                    echo "Code is not formatted properly"
                    gofmt -l .
                    exit 1
                  fi

            - name: Run linter
              uses: golangci/golangci-lint-action@v6
              with:
                  version: latest
                  args: --timeout=5m --issues-exit-code=0

            - name: Run tests
              run: go test -v -race -coverprofile=coverage.out ./...

            - name: Show coverage
              run: go tool cover -func=coverage.out

            - name: Build application
              run: CGO_ENABLED=0 go build -o sprint-twelve

            - name: Upload test artifacts
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: test-results
                  path: |
                      coverage.out
                      sprint-twelve

    publish:
        name: Publish to DockerHub
        needs: test
        runs-on: ubuntu-latest
        if: startsWith(github.ref, 'refs/tags/v')

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Get version
              id: get_version
              run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

            - name: Login to DockerHub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build Docker image
              run: |
                  docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPO }}:${{ steps.get_version.outputs.VERSION }} .
                  docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPO }}:latest .

            - name: Push Docker image
              run: |
                  docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPO }}:${{ steps.get_version.outputs.VERSION }}
                  docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPO }}:latest

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v1
              with:
                  tag_name: ${{ steps.get_version.outputs.VERSION }}
                  name: Release ${{ steps.get_version.outputs.VERSION }}
                  body: |
                      ## Docker Image
                      - `${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPO }}:${{ steps.get_version.outputs.VERSION }}`
                      - `${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPO }}:latest`

                      ## How to use
                      ```bash
                      docker pull ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPO }}:${{ steps.get_version.outputs.VERSION }}
                      docker run --rm ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPO }}:${{ steps.get_version.outputs.VERSION }}
                      ```
